<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>e-ID</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 12px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.menu {
  font-size: 22px;
  margin-right: 10px;
}

.header img {
  width: 40px;
  border-radius: 6px;
  margin-right: 10px;
}

.header-text {
  font-size: 14px;
}

/* TABS */
.tabs {
  display: flex;
  justify-content: space-around;
  background: white;
  border-bottom: 1px solid #ddd;
}

.tab {
  padding: 10px;
  color: gray;
}

.active {
  color: #00a8a8;
  border-bottom: 3px solid #00a8a8;
}

/* CARD */
.card {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.card img {
  width: 130px;
  border-radius: 10px;
}

h2 {
  margin: 10px 0 5px;
}

.info {
  text-align: left;
  margin-top: 20px;
}

.info p {
  margin: 8px 0;
}

/* BUTTONS */
button {
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #00a8a8;
  color: white;
}

/* SECTIONS */
.section { display: none; }
.show { display: block; }

input {
  width: 90%;
  padding: 8px;
  margin: 5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="menu">☰</div>
  <img src="https://via.placeholder.com/40">
  <div class="header-text">
    <b id="miniName"></b><br>
    <small id="miniId">0388308L</small>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('info', this)">My Info</div>
  <div class="tab" onclick="switchTab('privacy', this)">Privacy & Security</div>
  <div class="tab" onclick="switchTab('help', this)">Help</div>
</div>

<!-- INFO -->
<div id="info" class="section show">
  <div class="card">
    <img src="https://via.placeholder.com/130">

    <h2 id="name"></h2>
    <p id="dob"></p>

    <div class="info">
      <p><b>Email:</b> <span id="email"></span></p>
      <p><b>Phone:</b> <span id="phone"></span></p>
    </div>

    <button onclick="toggleEdit()">Edit</button>
    <button onclick="location.reload()">Refresh</button>

    <div id="editBox" style="display:none;">
      <input id="editName">
      <input id="editDob">
      <input id="editEmail">
      <input id="editPhone">
      <button onclick="save()">Save</button>
    </div>
  </div>
</div>

<!-- PRIVACY -->
<div id="privacy" class="section">
  <div class="card">
    <h2>Privacy & Security</h2>
    <p>Manage your data and account security.</p>
    <button onclick="localStorage.clear(); location.reload();">
      Clear Data
    </button>
  </div>
</div>

<!-- HELP -->
<div id="help" class="section">
  <div class="card">
    <h2>Help</h2>
    <p>If something isn’t working, refresh the app.</p>
  </div>
</div>

<script>
const data = JSON.parse(localStorage.getItem("data")) || {
  name: "Jake Fasanelli Simiana",
  dob: "11/11/2008",
  email: "example@gmail.com",
  phone: "+356 77007622"
};

function load() {
  name.innerText = data.name;
  dob.innerText = data.dob;
  email.innerText = data.email;
  phone.innerText = data.phone;
  miniName.innerText = data.name;

  editName.value = data.name;
  editDob.value = data.dob;
  editEmail.value = data.email;
  editPhone.value = data.phone;
}

function toggleEdit() {
  editBox.style.display =
    editBox.style.display === "none" ? "block" : "none";
}

function save() {
  const newData = {
    name: editName.value,
    dob: editDob.value,
    email: editEmail.value,
    phone: editPhone.value
  };

  localStorage.setItem("data", JSON.stringify(newData));
  location.reload();
}

function switchTab(id, el) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("show"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

  document.getElementById(id).classList.add("show");
  el.classList.add("active");
}

load();
</script>

</body>
</html>
